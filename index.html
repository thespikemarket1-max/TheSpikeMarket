<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpikeMarket ID</title>
    <style>
        :root { --pink: #ffafcc; --accent: #ff006e; --bg: #fdf2f8; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); padding-bottom: 80px; }
        
        /* Шапка */
        header { background: #fff; padding: 15px; text-align: center; border-bottom: 3px solid var(--pink); sticky; top: 0; z-index: 100; }
        h1 { margin: 0; color: var(--accent); font-size: 1.2rem; }

        .view { display: none; padding: 10px; }
        .active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Карточки как в OLX */
        .card { background: #fff; border-radius: 15px; overflow: hidden; margin-bottom: 15px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card-img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .card-info { padding: 12px; }
        .price { font-size: 1.3rem; font-weight: bold; color: #16a34a; margin-bottom: 5px; }
        .desc { font-size: 0.9rem; color: #444; line-height: 1.4; margin-bottom: 10px; white-space: pre-wrap; }
        
        .chat-btn { width: 100%; padding: 12px; background: #0088cc; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Форма продажи */
        .form-box { background: #fff; padding: 20px; border-radius: 20px; border: 2px solid var(--pink); }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .post-btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; }

        /* Навигация */
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #fff; display: flex; border-top: 2px solid var(--pink); }
        nav div { flex: 1; text-align: center; padding-top: 15px; font-size: 0.8rem; color: #888; font-weight: bold; }
        nav div.nav-active { color: var(--accent); }
    </style>
</head>
<body>

<header><h1>SPIKEBOARD ID 🏐</h1></header>

<div id="market" class="view active">
    <div id="ads-container">
        </div>
</div>

<div id="add" class="view">
    <div class="form-box">
        <h2 style="margin-top:0; color:var(--accent);">Jual Akun</h2>
        <input type="text" id="p-price" placeholder="Harga (Rp / IDR)">
        <input type="text" id="p-contact" placeholder="Link Telegram/WhatsApp">
        <textarea id="p-desc" rows="5" placeholder="Tulis deskripsi lengkap (Nishikawa S+, Gems, Balls, Rank...)"></textarea>
        <p style="font-size:0.8rem; color:#666;">Foto (Link gambar):</p>
        <input type="text" id="p-img" placeholder="Paste link foto di здесь">
        <button class="post-btn" onclick="addPost()">POSTING SEKARANG</button>
    </div>
</div>

<div id="profile" class="view">
    <div style="text-align:center; padding:30px; background:#fff; border-radius:20px;">
        <div style="font-size:3rem;">👤</div>
        <h2>My Profile</h2>
        <button onclick="localStorage.clear(); location.reload();" style="color:red; background:none; border:none;">Hapus Iklan Saya</button>
    </div>
</div>

<nav>
    <div onclick="show('market')" id="n-market" class="nav-active">🏠 MARKET</div>
    <div onclick="show('add')" id="n-add">➕ JUAL</div>
    <div onclick="show('profile')" id="n-profile">👤 PROFIL</div>
</nav>

<script>
    function show(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('nav div').forEach(n => n.classList.remove('nav-active'));
        document.getElementById('n-'+id).classList.add('nav-active');
        if(id === 'market') loadAds();
    }

    function addPost() {
        const price = document.getElementById('p-price').value;
        const contact = document.getElementById('p-contact').value;
        const desc = document.getElementById('p-desc').value;
        const img = document.getElementById('p-img').value || 'https://via.placeholder.com/400x200?text=No+Photo';

        if(!price || !contact || !desc) return alert("Isi semua data!");

        const newAd = { price, contact, desc, img };
        let ads = JSON.parse(localStorage.getItem('spikeAds')) || [];
        ads.unshift(newAd); // Добавляем в начало
        localStorage.setItem('spikeAds', JSON.stringify(ads));

        alert("Berhasil!");
        show('market');
    }

    function loadAds() {
        const container = document.getElementById('ads-container');
        let ads = JSON.parse(localStorage.getItem('spikeAds')) || [];

        if(ads.length === 0) {
            container.innerHTML = '<p style="text-align:center; padding:50px; opacity:0.5;">Belum ada iklan...</p>';
            return;
        }

        container.innerHTML = ads.map(ad => `
            <div class="card">
                <img src="${ad.img}" class="card-img" onerror="this.src='https://via.placeholder.com/400x200?text=Error+Photo'">
                <div class="card-info">
                    <div class="price">Rp ${ad.price}</div>
                    <div class="desc">${ad.desc}</div>
                    <a href="${ad.contact}" target="_blank" style="text-decoration:none;">
                        <button class="chat-btn">ЧАТ С ПРОДАВЦОМ</button>
                    </a>
                </div>
            </div>
        `).join('');
    }

    loadAds();
</script>

</body>
</html>
