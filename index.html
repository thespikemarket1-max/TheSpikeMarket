<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpikeShop - Маркет</title>
    <style>
        :root { --main: #002f34; --bg: #f2f4f5; --blue: #3a77ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: var(--main); }
        
        /* Шапка */
        .header { background: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.08); }
        .logo { font-weight: 900; font-size: 22px; color: var(--main); text-decoration: none; letter-spacing: -1px; }
        .user-badge { display: flex; align-items: center; gap: 10px; cursor: pointer; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; border: 1px solid #eee; }
        .user-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
        .user-name { font-size: 13px; font-weight: 600; }

        /* Сетка товаров */
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: 0.2s; position: relative; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #f0f0f0; }
        .card-info { padding: 10px; }
        .card-price { font-size: 18px; font-weight: 800; color: #000; margin-bottom: 4px; }
        .card-title { font-size: 14px; color: #406367; height: 34px; overflow: hidden; line-height: 1.2; margin-bottom: 8px; }
        .card-seller { font-size: 11px; color: #999; border-top: 1px solid #f0f0f0; padding-top: 5px; }

        /* Навигация */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; align-items: center; padding: 8px 0; border-top: 1px solid #eaeaeb; z-index: 1000; }
        .nav-item { border: none; background: none; font-size: 10px; display: flex; flex-direction: column; align-items: center; color: #7f9799; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--main); font-weight: bold; }
        .nav-center { background: var(--main); color: white; width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; transform: translateY(-18px); border: 5px solid var(--bg); box-shadow: 0 4px 12px rgba(0,47,52,0.3); }

        /* Секции */
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .profile-card { background: white; padding: 25px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .profile-card img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--blue); margin-bottom: 15px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: #777; margin-bottom: 5px; }
        .inp { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; }
        .inp:focus { border-color: var(--blue); }
        .btn { background: var(--main); color: white; border: none; width: 100%; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <a href="#" class="logo" onclick="showPage('main')">SpikeShop</a>
    <div class="user-badge" onclick="showPage('profile')">
        <img id="top-ava" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="user-avatar">
        <span id="top-name" class="user-name">Гость</span>
    </div>
</div>

<div id="main-page" class="page active">
    <div class="market-grid" id="ads-container">
        </div>
</div>

<div id="profile-page" class="page">
    <div class="profile-card">
        <img id="p-image" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        <div class="input-group">
            <label>Имя профиля</label>
            <input type="text" id="p-name-in" class="inp" placeholder="Введите имя">
        </div>
        <div class="input-group">
            <label>Ссылка на аватар</label>
            <input type="text" id="p-ava-in" class="inp" placeholder="https://...">
        </div>
        <button class="btn" onclick="saveProfile()">Сохранить изменения</button>
    </div>
</div>

<div id="fav-page" class="page">
    <div style="text-align: center; margin-top: 100px; color: #999;">
        <h2>❤️</h2>
        <p>У вас пока нет избранных товаров</p>
    </div>
</div>

<div class="nav">
    <button class="nav-item active" onclick="showPage('main')">🏠<br>Главная</button>
    <button class="nav-item" onclick="alert('Чат в разработке')">💬<br>Чат</button>
    <div class="nav-center" onclick="addPost()">+</div>
    <button class="nav-item" onclick="showPage('fav')">❤️<br>Лайки</button>
    <button class="nav-item" onclick="showPage('profile')">👤<br>Профиль</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    // Твои актуальные ключи
    const firebaseConfig = {
        apiKey: "AIzaSyDWUzYltbjHl0vHHxD5Dh6lV8mdmVA5aOQ",
        authDomain: "spikeshop-fdb9d.firebaseapp.com",
        projectId: "spikeshop-fdb9d",
        storageBucket: "spikeshop-fdb9d.firebasestorage.app",
        messagingSenderId: "642069456507",
        appId: "1:642069456507:web:e45e03c1246f09016264de",
        databaseURL: "https://spikeshop-fdb9d-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Загрузка данных пользователя из памяти телефона
    let currentUser = localStorage.getItem('userName') || "Игрок";
    let currentAva = localStorage.getItem('userAva') || "https://cdn-icons-png.flaticon.com/512/149/149071.png";

    function updateUI() {
        document.getElementById('top-name').innerText = currentUser;
        document.getElementById('top-ava').src = currentAva;
        document.getElementById('p-image').src = currentAva;
        document.getElementById('p-name-in').value = currentUser;
        document.getElementById('p-ava-in').value = currentAva;
    }

    function saveProfile() {
        currentUser = document.getElementById('p-name-in').value || "Игрок";
        currentAva = document.getElementById('p-ava-in').value || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        localStorage.setItem('userName', currentUser);
        localStorage.setItem('userAva', currentAva);
        updateUI();
        alert("Профиль обновлен!");
        showPage('main');
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId + '-page').classList.add('active');
        
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        // Простая логика подсветки кнопок
    }

    function addPost() {
        const title = prompt("Что вы хотите продать?");
        const price = prompt("Укажите цену (например, 200 сом):");
        const img = prompt("Ссылка на фото товара (или оставьте пустым):") || "https://cdn-icons-png.flaticon.com/512/3342/3342137.png";

        if (title && price) {
            db.ref('ads').push({
                title: title,
                price: price,
                image: img,
                seller: currentUser,
                time: Date.now()
            });
        }
    }

    // Слушаем базу данных и выводим товары
    db.ref('ads').on('value', (snapshot) => {
        const container = document.getElementById('ads-container');
        container.innerHTML = "";
        const data = snapshot.val();
        
        if (data) {
            Object.keys(data).reverse().forEach(id => {
                const item = data[id];
                container.innerHTML += `
                    <div class="card">
                        <img src="${item.image}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3342/3342137.png'">
                        <div class="card-info">
                            <div class="card-price">${item.price}</div>
                            <div class="card-title">${item.title}</div>
                            <div class="card-seller">👤 ${item.seller}</div>
                        </div>
                    </div>
                `;
            });
        }
    });

    updateUI();
</script>

</body>
</html>
