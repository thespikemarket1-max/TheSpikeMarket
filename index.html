<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPIKEBOARD ID</title>
    <style>
        :root { --pink: #ff006e; --bg: #fff0f5; --text: #333; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); margin: 0; padding-bottom: 70px; color: var(--text); }
        
        /* Шапка в стиле SPIKEBOARD */
        .header { background: white; padding: 15px; text-align: center; border-bottom: 2px solid #ffecf2; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: bold; font-size: 22px; color: var(--pink); text-transform: uppercase; letter-spacing: 1px; }

        /* Карточки и блоки */
        .container { padding: 15px; }
        .card-box { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(255, 0, 110, 0.1); border: 1px solid #ffecf2; margin-bottom: 15px; }
        h2 { color: var(--pink); margin-top: 0; font-size: 20px; }

        /* Поля ввода (как на скрине 3786) */
        .input-group { margin-bottom: 15px; }
        .inp { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 15px; outline: none; }
        .inp:focus { border-color: var(--pink); }
        textarea.inp { height: 100px; resize: none; }

        /* Кнопка POSTING (Розовая) */
        .btn-post { background: var(--pink); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }

        /* Сетка Маркета */
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .product { background: white; border-radius: 15px; overflow: hidden; position: relative; border: 1px solid #eee; }
        .product img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .product-info { padding: 8px; }
        .price { font-weight: bold; color: #000; font-size: 16px; }
        .title { font-size: 12px; color: #666; height: 30px; overflow: hidden; }
        .fav-btn { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.8); border-radius: 50%; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; }

        /* ЧАТ */
        #chat-box { height: 300px; overflow-y: auto; border: 1px solid #eee; padding: 10px; border-radius: 10px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 14px; }
        .msg.my { align-self: flex-end; background: var(--pink); color: white; }
        .msg.other { align-self: flex-start; background: #f0f0f0; }

        /* Навигация (как на скринах) */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; border-top: 1px solid #eee; }
        .nav-link { flex: 1; padding: 12px 0; text-align: center; font-size: 10px; color: #999; text-decoration: none; background: none; border: none; cursor: pointer; }
        .nav-link.active { color: var(--pink); font-weight: bold; }
        .nav-link span { font-size: 20px; display: block; }

        /* Скрытие секций */
        .section { display: none; }
        .section.active { display: block; }

        /* Удаление объявлений (красное) */
        .delete-link { color: #ff4d4d; font-size: 14px; text-decoration: none; display: block; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">SPIKEBOARD ID 🏐</div>
</div>

<div class="container">
    <div id="market" class="section active">
        <div class="market-grid" id="ads-list"></div>
    </div>

    <div id="sell" class="section">
        <div class="card-box">
            <h2>Продать Аккаунт</h2>
            <div class="input-group"><input type="text" id="add-price" class="inp" placeholder="Цена (сом / $) "></div>
            <div class="input-group"><input type="text" id="add-contact" class="inp" placeholder="Ссылка Telegram/WhatsApp"></div>
            <div class="input-group"><textarea id="add-desc" class="inp" placeholder="Описание (Nishikawa S+, Gems, Rank...)"></textarea></div>
            <div class="input-group"><input type="text" id="add-img" class="inp" placeholder="Ссылка на фото товара"></div>
            <button class="btn-post" onclick="publishAd()">ОПУБЛИКОВАТЬ СЕЙЧАС</button>
        </div>
    </div>

    <div id="chat" class="section">
        <div class="card-box">
            <h2>Чат Игроков</h2>
            <div id="chat-box"></div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="chat-in" class="inp" placeholder="Сообщение...">
                <button class="btn-post" style="width: 60px;" onclick="sendMsg()">></button>
            </div>
        </div>
    </div>

    <div id="profile" class="section">
        <div class="card-box" style="text-align: center;">
            <img id="my-ava" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px;">
            <h2 id="my-name-display">My Profile</h2>
            <div class="input-group"><input type="text" id="set-name" class="inp" placeholder="Твоё имя"></div>
            <div class="input-group"><input type="text" id="set-ava" class="inp" placeholder="Ссылка на фото"></div>
            <button class="btn-post" onclick="saveProfile()">Обновить данные</button>
            <span class="delete-link" onclick="deleteMyAds()">Удалить мои объявления</span>
        </div>
    </div>

    <div id="favs" class="section">
        <h2 style="text-align: center;">Мои Лайки ❤️</h2>
        <div class="market-grid" id="fav-list"></div>
    </div>
</div>

<div class="nav">
    <button class="nav-link active" onclick="go('market')"><span>🏠</span>MARKET</button>
    <button class="nav-link" onclick="go('chat')"><span>💬</span>ЧАТ</button>
    <button class="nav-link" onclick="go('sell')"><span>➕</span>ПРОДАТЬ</button>
    <button class="nav-link" onclick="go('favs')"><span>❤️</span>ЛАЙКИ</button>
    <button class="nav-link" onclick="go('profile')"><span>👤</span>ПРОФИЛЬ</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDWUzYltbjHl0vHHxD5Dh6lV8mdmVA5aOQ",
        authDomain: "spikeshop-fdb9d.firebaseapp.com",
        projectId: "spikeshop-fdb9d",
        storageBucket: "spikeshop-fdb9d.firebasestorage.app",
        messagingSenderId: "642069456507",
        appId: "1:642069456507:web:e45e03c1246f09016264de",
        databaseURL: "https://spikeshop-fdb9d-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = localStorage.getItem('uName') || "Игрок";
    let myAva = localStorage.getItem('uAva') || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
    let myLikes = JSON.parse(localStorage.getItem('myLikes') || "[]");

    function go(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function saveProfile() {
        myName = document.getElementById('set-name').value || myName;
        myAva = document.getElementById('set-ava').value || myAva;
        localStorage.setItem('uName', myName);
        localStorage.setItem('uAva', myAva);
        location.reload();
    }

    function publishAd() {
        const price = document.getElementById('add-price').value;
        const desc = document.getElementById('add-desc').value;
        const contact = document.getElementById('add-contact').value;
        const img = document.getElementById('add-img').value || "https://via.placeholder.com/150";

        if(price && desc) {
            db.ref('ads').push({
                p: price, d: desc, c: contact, i: img, s: myName, time: Date.now()
            });
            alert("Объявление выставлено!");
            go('market');
        }
    }

    function toggleLike(id) {
        const idx = myLikes.indexOf(id);
        if(idx > -1) myLikes.splice(idx, 1);
        else myLikes.push(id);
        localStorage.setItem('myLikes', JSON.stringify(myLikes));
        renderAds();
    }

    function sendMsg() {
        const txt = document.getElementById('chat-in').value;
        if(txt) {
            db.ref('chat').push({ n: myName, t: txt });
            document.getElementById('chat-in').value = "";
        }
    }

    function renderAds() {
        db.ref('ads').on('value', snap => {
            const list = document.getElementById('ads-list');
            const favList = document.getElementById('fav-list');
            list.innerHTML = ""; favList.innerHTML = "";
            snap.forEach(child => {
                const ad = child.val();
                const id = child.key;
                const isLiked = myLikes.includes(id);
                const html = `
                    <div class="product">
                        <div class="fav-btn" onclick="toggleLike('${id}')">${isLiked ? '❤️' : '🤍'}</div>
                        <img src="${ad.i}">
                        <div class="product-info">
                            <div class="price">${ad.p}</div>
                            <div class="title">${ad.d}</div>
                        </div>
                    </div>`;
                list.innerHTML = html + list.innerHTML;
                if(isLiked) favList.innerHTML = html + favList.innerHTML;
            });
        });
    }

    db.ref('chat').limitToLast(20).on('value', snap => {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        snap.forEach(c => {
            const m = c.val();
            const isMe = m.n === myName;
            box.innerHTML += `<div class="msg ${isMe ? 'my' : 'other'}"><b>${m.n}:</b> ${m.t}</div>`;
        });
        box.scrollTop = box.scrollHeight;
    });

    function deleteMyAds() {
        if(confirm("Удалить все твои объявления?")) {
            db.ref('ads').once('value', snap => {
                snap.forEach(child => {
                    if(child.val().s === myName) child.ref.remove();
                });
            });
            alert("Твои объявления удалены!");
        }
    }

    document.getElementById('my-name-display').innerText = myName;
    document.getElementById('my-ava').src = myAva;
    document.getElementById('set-name').value = myName;
    document.getElementById('set-ava').value = myAva;
    renderAds();
</script>
</body>
</html>
