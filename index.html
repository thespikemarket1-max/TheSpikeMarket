<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpikeCute ID</title>
    <style>
        :root {
            --pink: #ffafcc;
            --blue: #a2d2ff;
            --accent: #ff006e;
            --white: #ffffff;
        }
        body { 
            margin: 0; font-family: 'Arial', sans-serif; background: #fdf2f8; 
            background-image: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), url('https://i.pinimg.com/originals/f3/8c/7e/f38c7e42d7b1d4c8b2a3a5f8e5f1a5f1.jpg');
            background-size: cover; background-attachment: fixed; padding-bottom: 80px;
        }
        header { background: var(--white); padding: 15px; text-align: center; border-bottom: 4px solid var(--pink); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { margin: 0; color: var(--accent); font-size: 1.5rem; text-shadow: 2px 2px #ffc8dd; }

        /* Кнопки переключения (Вкладки) */
        .view { display: none; padding: 15px; }
        .active { display: block; animation: pop 0.3s ease; }
        @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Дизайн карточек (Как в OLX) */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: var(--white); border-radius: 15px; overflow: hidden; border: 2px solid var(--pink); }
        .card-img { width: 100%; height: 100px; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .card-body { padding: 10px; }
        .price { color: #2ecc71; font-weight: bold; font-size: 1.1rem; }

        /* Профиль */
        .profile-card { background: var(--white); border-radius: 20px; padding: 20px; text-align: center; border: 3px dashed var(--pink); margin-top: 20px; }
        .avatar { width: 80px; height: 80px; background: var(--blue); border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; border: 4px solid var(--white); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* Нижнее меню (НАВИГАЦИЯ) */
        nav { position: fixed; bottom: 0; width: 100%; background: var(--white); display: flex; border-top: 3px solid var(--pink); height: 70px; z-index: 1000; }
        nav div { flex: 1; text-align: center; padding-top: 10px; font-weight: bold; font-size: 0.8rem; color: #777; cursor: pointer; }
        nav div.nav-active { color: var(--accent); }
        nav div span { display: block; font-size: 1.5rem; }

        /* Форма продажи */
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid var(--blue); border-radius: 10px; box-sizing: border-box; }
        .btn-sell { background: var(--accent); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 1rem; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>SPIKECUTE ID 🏐✨</h1>
</header>

<div id="market" class="view active">
    <div class="grid">
        <div class="card">
            <div class="card-img">🏐</div>
            <div class="card-body">
                <div class="price">Rp 150.000</div>
                <div style="font-size: 0.8rem; font-weight: bold;">Nishikawa S+ Max</div>
                <button style="width: 100%; margin-top: 5px; background: var(--blue); border: none; border-radius: 5px; padding: 5px; color: white;">Beli</button>
            </div>
        </div>
        <div class="card">
            <div class="card-img">⚡</div>
            <div class="card-body">
                <div class="price">Rp 50.000</div>
                <div style="font-size: 0.8rem; font-weight: bold;">Sohee Starter</div>
                <button style="width: 100%; margin-top: 5px; background: var(--blue); border: none; border-radius: 5px; padding: 5px; color: white;">Beli</button>
            </div>
        </div>
    </div>
</div>

<div id="add" class="view">
    <div style="background: white; padding: 20px; border-radius: 20px; border: 2px solid var(--blue);">
        <h2 style="text-align: center; color: var(--accent);">Jual Akun Kamu</h2>
        <input type="text" placeholder="Nama Akun">
        <input type="number" placeholder="Harga (IDR)">
        <input type="text" placeholder="WhatsApp / Telegram">
        <textarea placeholder="Deskripsi Akun (Rank, Gem, dll)"></textarea>
        <input type="file" multiple>
        <button class="btn-sell">POSTING SEKARANG</button>
    </div>
</div>

<div id="profile" class="view">
    <div class="profile-card">
        <div class="avatar">🐱</div>
        <h2 style="margin: 10px 0 5px;">Player ID</h2>
        <p style="color: #888; margin: 0;">Rank: Beginner Trader</p>
    </div>
    <div style="margin-top: 20px;">
        <h3>Iklan Saya (0)</h3>
        <p style="text-align: center; opacity: 0.5;">Kamu belum jualan что-то...</p>
    </div>
</div>

<nav>
    <div onclick="show('market')" id="n-market" class="nav-active"><span>🏠</span>MARKET</div>
    <div onclick="show('add')" id="n-add"><span>➕</span>JUAL</div>
    <div onclick="show('profile')" id="n-profile"><span>👤</span>PROFIL</div>
</nav>

<script>
    function show(id) {
        // Скрыть все вкладки
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        // Показать нужную
        document.getElementById(id).classList.add('active');
        // Покрасить иконку в меню
        document.querySelectorAll('nav div').forEach(n => n.classList.remove('nav-active'));
        document.getElementById('n-'+id).classList.add('nav-active');
    }
</script>

</body>
</html>
