<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpikeBoard ID</title>
    <style>
        body { font-family: sans-serif; background: #fff0f5; margin: 0; padding-bottom: 350px; }
        .header { background: white; padding: 15px; text-align: center; font-weight: bold; font-size: 20px; border-bottom: 1px solid #eee; }
        .categories { display: flex; justify-content: center; gap: 10px; padding: 15px; overflow-x: auto; }
        .categories button { background: white; border: 1px solid #ffb6c1; padding: 8px 15px; border-radius: 20px; white-space: nowrap; }
        
        .market-container { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .ad-card { background: white; border-radius: 12px; padding: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .ad-card img { width: 100%; border-radius: 8px; aspect-ratio: 1/1; object-fit: cover; background: #eee; }
        .ad-price { font-weight: bold; color: #d63384; margin-top: 8px; font-size: 16px; }

        /* ЧАТ ВНИЗУ */
        .chat-section { position: fixed; bottom: 65px; left: 0; right: 0; background: white; border-top: 2px solid #ffb6c1; height: 280px; display: flex; flex-direction: column; z-index: 10; }
        #chat-container { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; background: #fff9fb; }
        .chat-bar { display: flex; padding: 10px; gap: 5px; border-top: 1px solid #eee; }
        .chat-bar input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 8px; outline: none; }
        .chat-bar button { background: #ffb6c1; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 20; }
        .nav-btn { border: none; background: none; font-size: 12px; font-weight: bold; color: #555; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body>

<div class="header">SPIKEBOARD ID 🏐</div>

<div class="categories">
    <button>Все</button>
    <button>Дешевые</button>
    <button>S+ Игроки</button>
</div>

<div class="market-container" id="ads-list">
    </div>

<div class="chat-section">
    <div style="padding: 5px 10px; font-weight: bold; font-size: 13px; color: #d63384;">Глобальный чат</div>
    <div id="chat-container"></div>
    <div class="chat-bar">
        <input type="text" id="chat-msg" placeholder="Сообщение...">
        <button onclick="sendChat()">></button>
    </div>
</div>

<div class="bottom-nav">
    <button class="nav-btn" onclick="window.scrollTo(0,0)">🏠 MARKET</button>
    <button class="nav-btn" onclick="createAd()">➕ JUAL</button>
    <button class="nav-btn" onclick="googleLogin()">👤 PROFIL</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDvd9iKXNDea5JnnxUPb-PF_5yssqSWjWs",
    authDomain: "spikemarket-a2ce6.firebaseapp.com",
    databaseURL: "https://spikemarket-a2ce6-default-rtdb.firebaseio.com",
    projectId: "spikemarket-a2ce6",
    storageBucket: "spikemarket-a2ce6.firebasestorage.app",
    messagingSenderId: "405255023037",
    appId: "1:405255023037:web:726d7cc3a1ee344f3e4ad4"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).then((res) => {
        alert("Вошел как: " + res.user.displayName);
    }).catch((err) => {
        console.error(err);
        alert("Ошибка! Проверь 'Authorized domains' в Firebase!");
    });
  }

  function sendChat() {
    const m = document.getElementById('chat-msg');
    if (!auth.currentUser) return alert("Войди в PROFIL!");
    if (!m.value.trim()) return;
    db.ref('chat').push({ name: auth.currentUser.displayName, text: m.value, time: Date.now() });
    m.value = "";
  }

  db.ref('chat').limitToLast(15).on('value', s => {
    const c = document.getElementById('chat-container');
    c.innerHTML = "";
    s.forEach(child => {
        const d = child.val();
        c.innerHTML += `<div><b>${d.name}:</b> ${d.text}</div>`;
    });
    c.scrollTop = c.scrollHeight;
  });

  function createAd() {
    if (!auth.currentUser) return alert("Войди в профиль, чтобы продать акк!");
    const p = prompt("Цена (например, 200 RUB):");
    const d = prompt("Что на аккаунте?");
    if (p && d) {
      db.ref('ads').push({ price: p, desc: d, seller: auth.currentUser.displayName, img: "https://via.placeholder.com/150" });
    }
  }

  db.ref('ads').on('value', s => {
    const l = document.getElementById('ads-list');
    l.innerHTML = "";
    s.forEach(child => {
      const a = child.val();
      l.innerHTML += `<div class="ad-card"><img src="${a.img}"><div class="ad-price">${a.price}</div><div style="font-size:12px;">${a.desc}</div></div>`;
    });
  });
</script>
</body>
</html>
