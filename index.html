<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpikeBoard ID - Free Trading Platform</title>
    <style>
        /* Основные стили в стиле The Spike */
        :root {
            --bg-dark: #0a081f;
            --card-bg: rgba(27, 22, 66, 0.85); /* Полупрозрачный для фона */
            --accent: #00f2ff; /* Яркий неон */
            --text: #ffffff;
            --border: #3d348b;
            --success: #00ff88;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding-bottom: 80px;
            color: var(--text);
            /* ФОН В СТИЛЕ THE SPIKE (Площадка + Персонажи) */
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(10, 8, 31, 0.8), rgba(10, 8, 31, 0.95)), /* Затемнение */
                url('https://i.ytimg.com/vi/SnduVMDf0X8/maxresdefault.jpg'); /* Изображение из игры */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header {
            text-align: center;
            padding: 15px;
            background: rgba(22, 18, 61, 0.9);
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.2);
        }

        header h1 {
            font-size: 1.2rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        /* Кнопка "Написать" - стиль неон */
        .contact-btn {
            display: block;
            width: 100%;
            padding: 10px 0;
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.8rem;
            margin-top: 10px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .contact-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 15px var(--accent);
        }

        /* Форма отправки */
        .view { display: none; padding: 20px; box-sizing: border-box; }
        .active { display: block; }

        .form-box {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(5px);
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(10, 8, 31, 0.6);
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 0.9rem;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
            outline: none;
        }

        /* Нижнее меню навигации */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(22, 18, 61, 0.95);
            display: flex;
            border-top: 2px solid var(--border);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        nav div {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.6);
            transition: 0.3s;
        }

        nav div.nav-active {
            color: var(--accent);
            font-weight: bold;
            border-top: 2px solid var(--accent);
            margin-top: -2px; /* Чтобы border перекрывал основной */
        }
    </style>
</head>
<body>

<header>
    <h1>SPIKEBOARD ID</h1>
    <p style="font-size: 0.7rem; margin: 5px 0 0 0; opacity: 0.8; color: #eee;">P2P Trading • No Fees • No Middleman</p>
</header>

<div id="market" class="view active">
    <div style="text-align: center; padding: 50px 20px; color: #bbb;">
        <p style="font-size: 3rem; margin: 0;">🏐</p>
        <p style="font-size: 0.9rem;">Market is empty.<br>Be the first to post your account!</p>
    </div>
</div>

<div id="add" class="view">
    <div class="form-box">
        <h2 style="text-align:center; font-size: 1.1rem; color: var(--accent); margin-top: 0;">POST YOUR ACCOUNT</h2>
        
        <input type="text" placeholder="Account Title (e.g., S+ Rank Nishikawa Max)">
        <input type="number" placeholder="Price in IDR (e.g., 100000)">
        
        <input type="text" placeholder="Your Contact Link (Telegram/WhatsApp)">
        
        <textarea placeholder="Describe your account (Rank, Characters, Level, Gems, Balls...)" rows="5"></textarea>
        
        <label style="font-size: 0.8rem; color: var(--accent); display: block; margin-top: 10px;">Attach Account Screenshots (Max 5):</label>
        <input type="file" accept="image/*" multiple style="background: transparent; border: none; padding: 10px 0;">
        
        <button style="width:100%; padding: 15px; background: var(--success); color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; margin-top: 20px; text-transform: uppercase; cursor: pointer;">SUBMIT AD NOW</button>
    </div>
</div>

<nav>
    <div onclick="show('market')" id="n-market" class="nav-active">🛒 MARKET</div>
    <div onclick="show('add')" id="n-add">➕ POST AD</div>
</nav>

<script>
    function show(id) {
        // Переключение страниц
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        // Переключение активного пункта меню
        document.querySelectorAll('nav div').forEach(n => n.classList.remove('nav-active'));
        document.getElementById('n-'+id).classList.add('nav-active');
    }
</script>

</body>
</html>
