<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpikeCute ID - Market Lucu</title>
    <style>
        :root {
            /* Пастельная, "милая" палитра */
            --bg: #fdf2f8; /* Нежно-розовый фон */
            --accent: #06b6d4; /* Яркий бирюзовый (неон) */
            --card: #ffffff; /* Белые карточки */
            --text-dark: #1e293b; /* Темный текст для читаемости */
            --price: #16a34a; /* Зеленый для цены */
            --neon-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
        }
        body { 
            margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text-dark); padding-bottom: 80px;
            /* КАСТОМНЫЙ ФОН С ЧИБИ-ПЕРСОНАЖАМИ (Пример ссылки, нужно заменить на реальную) */
            background-image: 
                linear-gradient(rgba(253, 242, 248, 0.8), rgba(253, 242, 248, 0.95)), /* Легкое затемнение */
                url('https://cdna.artstation.com/p/assets/images/images/051/365/860/large/art-by-jio-the-spike-characters-chibi.jpg?1657106096'); /* Пример коллажа чибиков */
            background-size: cover; background-attachment: fixed; background-position: center;
        }
        header { text-align: center; padding: 20px 15px; background: rgba(255, 255, 255, 0.9); border-bottom: 3px solid var(--accent); position: sticky; top: 0; z-index: 100; box-shadow: var(--neon-shadow); border-radius: 0 0 20px 20px; }
        h1 { margin: 0; font-size: 1.4rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; text-shadow: var(--neon-shadow); }

        /* Сетка как в OLX (Милая версия) */
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .olx-card { 
            background: var(--card); border-radius: 18px; overflow: hidden; border: 1px solid #e2e8f0;
            display: flex; flex-direction: column; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .olx-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.3); }
        .img-placeholder { width: 100%; height: 130px; background: #e0f2fe; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--accent); border-bottom: 1px solid #e2e8f0; }
        .card-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between;}
        .card-title { font-size: 0.9rem; font-weight: 600; margin: 0; color: var(--text-dark); height: 38px; overflow: hidden; line-height: 1.2; }
        .card-price { color: var(--price); font-size: 1.1rem; font-weight: 700; margin: 8px 0; }
        .card-btn { 
            width: 100%; padding: 10px; background: var(--accent); border: none; border-radius: 10px; 
            font-weight: bold; font-size: 0.8rem; color: #fff; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 2px 4px rgba(6, 182, 212, 0.3);
        }

        /* Профиль (Милый) */
        .profile-header { text-align: center; padding: 40px 20px; background: #fff; border-radius: 25px; margin: 20px; border: 2px dashed var(--accent); box-shadow: var(--neon-shadow); }
        .avatar { width: 90px; height: 90px; background: #e0f2fe; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--accent); border: 3px solid var(--accent); }

        /* Форма (Милая) */
        .view { display: none; padding: 15px; box-sizing: border-box; }
        .active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .form-box { background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .form-box input, .form-box textarea { 
            width: 100%; padding: 14px; margin: 10px 0; background: #f8fafc; 
            border: 1px solid #e2e8f0; color: var(--text-dark); border-radius: 10px; box-sizing: border-box; font-size: 0.9rem;
        }
        .form-box input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1); }

        /* Анимация левитации с "блестками" */
        .ball-float {
            font-size: 3rem; margin-top: 60px; display: inline-block;
            animation: floatBall 3s ease-in-out infinite;
            position: relative;
        }
        @keyframes floatBall { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-25px); } }
        .ball-float::after {
            content: "✨"; position: absolute; font-size: 1rem; top: -10px; right: -15px; animation: sparkle 2s infinite; opacity: 0;
        }
        @keyframes sparkle { 0%, 100% { opacity: 0; } 50% { opacity: 1; transform: scale(1.2); } }

        /* Меню (Pastel) */
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(255,255,255,0.95); display: flex; border-top: 2px solid #e2e8f0; backdrop-filter: blur(10px); z-index: 100; border-radius: 20px 20px 0 0; box-shadow: 0 -4px 10px rgba(0,0,0,0.03); }
        nav div { flex: 1; text-align: center; padding-top: 15px; font-size: 0.8rem; cursor: pointer; color: #64748b; font-weight: 500; }
        nav div.nav-active { color: var(--accent); font-weight: 700; text-shadow: var(--neon-shadow); }
        nav div span { display: block; font-size: 1.2rem; margin-bottom: 3px; }
    </style>
</head>
